spring.application.name=backend

# MySQL Configuration - XAMPP
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/livrasion_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# Temporarily allow Hibernate to update schema to match entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server - bind to all interfaces for mobile access
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# JWT Configuration (base64 encoded secret - minimum 256 bits)
jwt.secret=${JWT_SECRET:Vm90cmVDbGVTZWNyZXRlVHJlc0xvbmd1ZUV0U2VjdXJpc2VlMTIzNDU2Nzg5QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OSRM routing engine
osrm.url=${OSRM_URL:http://localhost:5000}
# Penalty in minutes per active order when scoring livreurs
osrm.workload-penalty-minutes=${OSRM_WORKLOAD_PENALTY_MINUTES:5}

# Firebase Cloud Messaging
firebase.service-account-file=${FIREBASE_SERVICE_ACCOUNT_FILE:firebase-service-account.json}

